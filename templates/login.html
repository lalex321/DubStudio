{% extends "base.html" %}
{% block content %}
<section class="auth">
  <h1>Sign in</h1>
  <form method="post" action="/login" class="form">
    <label>
      <span>Username</span>
      <input type="text" name="email" value="{{ email|default('') }}" autofocus required autocomplete="username">
    </label>
    <label>
      <span>Password</span>
      <input type="password" name="password" required>
    </label>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <button type="submit" class="btn btn-primary">Sign in</button>
  </form>
</section>
{% endblock %}
