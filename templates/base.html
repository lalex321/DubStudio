<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ title|default("DubStudio") }}</title>
<script>
  (function () {
    const t = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
</head>
<body>
<header class="topbar">
  <a class="brand" href="/">DubStudio</a>
  <nav class="nav">
    {% if user %}
    <a href="/projects">Projects</a>
    {% if is_admin %}<a href="/admin">Admin</a>{% endif %}
    <span class="user">{{ user }}</span>
    <form method="post" action="/logout" class="logout-form"><button type="submit" class="muted link-btn">Sign out</button></form>
    {% endif %}
    <button type="button" class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme"></button>
  </nav>
</header>
<script>
  (function () {
    const btn = document.getElementById('theme-toggle');
    const render = () => {
      btn.textContent = document.documentElement.dataset.theme === 'light' ? '☾' : '☀';
    };
    btn.addEventListener('click', () => {
      const next = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
      document.documentElement.dataset.theme = next;
      localStorage.setItem('theme', next);
      render();
    });
    render();
  })();
</script>
<main class="main">
  {% if flash %}<div class="flash flash-{{ flash.level }}">{{ flash.msg }}</div>{% endif %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
