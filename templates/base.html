<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ title|default("DubStudio") }}</title>
<script>
  (function () {
    const t = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="/">DubStudio</a>
    <nav class="nav">
      {% if user %}
      <a href="/projects">Projects</a>
      {% if is_admin %}<a href="/admin">Admin</a>{% endif %}
      <span class="user">{{ user }}</span>
      <form method="post" action="/logout" class="logout-form"><button type="submit" class="muted link-btn">Sign out</button></form>
      {% endif %}
      <button type="button" class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme"></button>
    </nav>
  </div>
</header>
<script>
  (function () {
    const btn = document.getElementById('theme-toggle');
    const render = () => {
      btn.textContent = document.documentElement.dataset.theme === 'light' ? '☾' : '☀';
    };
    btn.addEventListener('click', () => {
      const next = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
      document.documentElement.dataset.theme = next;
      localStorage.setItem('theme', next);
      render();
    });
    render();
  })();
</script>
<main class="main">
  {% if flash %}<div class="flash flash-{{ flash.level }}">{{ flash.msg }}</div>{% endif %}
  {% block content %}{% endblock %}
</main>
<script>
// Keep any grid's sticky thead tucked below the topbar + the page's own
// sticky top region (.project-top / .admin-top). Measured live so that
// wrapping page-heads on narrow screens don't hide the header underneath.
(function () {
  const apply = () => {
    const topbar = document.querySelector('.topbar');
    const top = document.querySelector('.project-top, .admin-top');
    const h = (topbar?.offsetHeight || 0) + (top?.offsetHeight || 0);
    document.documentElement.style.setProperty('--sticky-head-top', h + 'px');
  };
  document.addEventListener('DOMContentLoaded', apply);
  window.addEventListener('load', apply);
  window.addEventListener('resize', apply);
})();
</script>
</body>
</html>
