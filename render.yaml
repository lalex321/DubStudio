services:
  - type: web
    name: dubstudio
    runtime: python
    plan: starter
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: DUBSTUDIO_SESSION_SECRET
        generateValue: true
      - key: DUBSTUDIO_ADMIN_EMAIL
        sync: false
      - key: DUBSTUDIO_ADMIN_PASSWORD
        sync: false
